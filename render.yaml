services:
  - type: web
    name: notaclock-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:server
    startCommand: npm --workspace server run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - render.yaml
        - server/**
      ignoredPaths:
        - client/**
        - .github/**
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: CLOCK_TIMEZONE
        value: America/New_York
      - key: RETENTION_HOURS
        value: 24
      - key: GENERATION_INTERVAL_MINUTES
        value: 5
      - key: GENERATION_JITTER_MINUTES
        value: 4
      - key: MIN_REFRESH_INTERVAL_MINUTES
        value: 5
      - key: MAX_REFRESH_INTERVAL_MINUTES
        value: 60
      - key: DEFAULT_REFRESH_INTERVAL_MINUTES
        value: 5
      - key: REFRESH_INTERVAL_STEP_MINUTES
        value: 5
      - key: RENDER_MODE
        value: fal
      - key: ALLOW_MOCK_FALLBACK
        value: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: FAL_KEY
        sync: false
      - key: FAL_MODEL
        value: fal-ai/illusion-diffusion
      - key: FAL_GUIDANCE_SCALE
        value: 0.75
      - key: FAL_CONTROLNET_CONDITIONING_SCALE
        value: 1
      - key: FAL_CONTROL_GUIDANCE_START
        value: 0
      - key: FAL_CONTROL_GUIDANCE_END
        value: 1
      - key: FAL_NUM_INFERENCE_STEPS
        value: 40
      - key: FAL_SCHEDULER
        value: Euler
      - key: MEDIA_ROOT
        value: /tmp/notaclock
